<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About — Node.js Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e8eaf2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .badge { background: #60c0f0; color: #001a26; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px; border-radius: 50px; }
    h1 { font-size: 2.2rem; font-weight: 800; }
    h1 span { color: #60c0f0; }
    p { color: #8b90a8; font-size: 1rem; max-width: 480px; text-align: center; line-height: 1.7; }
    .links { display: flex; gap: 14px; margin-top: 10px; }
    a { color: #60c0f0; text-decoration: none; border: 1px solid #2a2f42; padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
    a:hover { background: #1c2030; border-color: #60c0f0; }
  </style>
</head>
<body>
  <span class="badge">/about</span>
  <h1><span>About</span> Page</h1>
  <p>This is the About page served by a pure Node.js HTTP server using the built-in <code>http</code> module. No Express or third-party frameworks required!</p>
  <div class="links">
    <a href="/">🏠 Home</a>
    <a href="/about">ℹ️ About</a>
    <a href="/contact">✉️ Contact</a>
  </div>
</body>
</html>
