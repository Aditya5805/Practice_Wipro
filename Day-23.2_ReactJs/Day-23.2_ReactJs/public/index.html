<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Node.js HTTP Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e8eaf2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .badge {
      background: #f0c060;
      color: #1a1200;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 50px;
    }
    h1 { font-size: 2.5rem; font-weight: 800; }
    h1 span { color: #f0c060; }
    p { color: #8b90a8; font-size: 1rem; }
    .links { display: flex; gap: 14px; margin-top: 10px; }
    a {
      color: #60c0f0;
      text-decoration: none;
      border: 1px solid #2a2f42;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    a:hover { background: #1c2030; border-color: #60c0f0; }
  </style>
</head>
<body>
  <span class="badge">Challenge 5 — HTTP Module</span>
  <h1>Hello from <span>Node.js</span> Server!</h1>
  <p>Pure Node.js HTTP server — no Express, no frameworks.</p>
  <div class="links">
    <a href="/">🏠 Home</a>
    <a href="/about">ℹ️ About</a>
    <a href="/contact">✉️ Contact</a>
  </div>
</body>
</html>
